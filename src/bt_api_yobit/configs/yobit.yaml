# YoBit Configuration – Feed pattern
# Russian cryptocurrency exchange

YOBIT___SPOT:
  exchange_name: "YOBIT___SPOT"
  asset_type: "SPOT"
  rest_url: "https://yobit.net"
  wss_url: "wss://ws.yobit.net"

  auth_type: "hmac_sha512"

  rest_paths:
    get_tick: "GET /api/3/ticker/{pair}"
    get_ticker: "GET /api/3/ticker/{pair}"
    get_depth: "GET /api/3/depth/{pair}"
    get_trades: "GET /api/3/trades/{pair}"
    get_exchange_info: "GET /api/3/info"
    get_server_time: "GET /api/3/info"
    get_account: "POST /tapi"
    get_balance: "POST /tapi"
    make_order: "POST /tapi"
    cancel_order: "POST /tapi"
    query_order: "POST /tapi"

  kline_periods:
    "1m": "1"
    "3m": "3"
    "5m": "5"
    "15m": "15"
    "30m": "30"
    "1h": "60"
    "2h": "120"
    "4h": "240"
    "6h": "360"
    "12h": "720"
    "1d": "1d"
    "1w": "1w"

  legal_currency:
    - "USD"
    - "USDT"
    - "RUB"
    - "BTC"
    - "ETH"
    - "DOGE"

  rate_limits:
    public_api: 120
